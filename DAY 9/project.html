<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .container {
            display: grid;
            grid-template-areas: 
            "header header"
            "link content"
            "footer footer";
            background-color: aqua;
            padding: 10px;
            gap: 5px;
        }
        .container div{
            background-color: white;
            padding: 10px;
        }
        .container div.header {
            font-size: 20px;
            background-color: red;
            text-align: center;
            grid-area: header;
        }
        .container div.link {
            font-size: 30px;
            grid-area: link;
        }
        .container div .content {
            grid-area: content;
        }
        .container div .footer {
            grid-area: footer;
            text-align: center;
        }

      </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
      
<body>
    <h1>CSS Grid Layout</h1>
    <p>The Grid layout module offers a grid-based layout system,with rpw and coloumns.</p>

   <p>The Grid layout makes it easy to design complex and responsive web pages without using floats and positioning.</p>

    <div class="container">
        <div class="header">My Header</div>
        <div class="link">
             <u>
                 <a href="https://www.link1.com">Link 1</a><br>
                 <a href="https://www.link2.com">Link 2</a><br>
                 <a href="https://www.link3.com">Link 3</a><br>
             </u>
        </div>
    <div class="content">
      <h2>Lorium Ipsum</h2>
      <p>This is paragraph</p>   
    </div>
    <div class="footer">Footer</div>
    </div>
</body>
</html>
