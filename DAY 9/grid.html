<!DOCTYPE html>
<html lang="en">
<head>
    <style>
    .container {
        display: grid;
        grid-template-columns: auto auto auto;
        background-color: rgba(255, 0, 0, 0.493);
        padding: 10px;
        gap: 5px;
    }
    .container div {
        background-color: rgb(224, 173, 62);
        padding: 10px;
        font-size: 30px;
        text-align: center;
    }
</style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
      <div>4</div> 
      <div>5</div>   
      <div>6</div>
    </div>
</body>
</html>
