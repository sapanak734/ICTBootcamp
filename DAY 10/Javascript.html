<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript</title>
</head>
<body>
    <h1>Variables</h1>
    <h2>Javascript Numbers</h2>
    <p>Numbers can be written with or without decimals.Example is given below:</p>
    <p id="demo"></p>

    <h1>Javascript Syntax</h1>
    <p>The let,var and const keyword create variables.</p>
    <p id="demo2"></p>

    <h2>Summation Example</h2>
    <p>The sum is :</p>
    <p id="sum"></p>

    <script>
      document.getElementById("demo").innerHTML= "The number with decimal is 10.5";
      let x = 5;
      const fname = "Ram";
      document.getElementById("demo2").innerHTML =fname + " is " + x + " years old.";

      let y = 10;
      let sum = x+ y;
      document.getElementById("sum").innerHTML = sum;


    </script>
</body>
</html>
