<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>
<body>
    <h>Simple Calculator</h>

      <input type="number"id="num1" placeholder="Enter num1">
      <input type="number" id="num2" placeholder="Enter num2">
      <br><br>
      <button onclick="
      let x =parseFloat(document.getElementById('num1').value);
      let y =parseFloat(document.getElementById('num2').value);
      document.getElementById('result').innerHTML =x+y;
      ">+</button>
      <button onclick="
        let x =parseFloat(document.getElementById('num1').value);
        let y =parseFloat(document.getElementById('num2').value);
        document.getElementById('result').innerHTML = x-y";
        ">-</button>
        <button onclick="
          let x =parseFloat(document.getElementById('num1').value);
          let y =parseFloat(document.getElementById('num2').value);
          document.getElementById('result').innerHTML =x*y";
          ">*</button>
          <button onclick="
            let x =parseFloat(document.getElementById('num1').value);
            let y =parseFloat(document.getElementById('num2').value);
            document.getElementById('result').innerHTML = x/y";
            ">/</button>
            <h1>Result</h1>
            <h2 id="result"></h2>
            
</body>
</html>
